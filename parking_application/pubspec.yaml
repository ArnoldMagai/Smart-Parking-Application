name: parking_application
description: A smart parking Flutter application interacting with Django backend.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.1
  fl_chart: ^0.63.0 # For prediction charts
  cupertino_icons: ^1.0.2
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
